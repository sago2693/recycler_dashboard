<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React + TS</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:2rem;font-family:sans-serif;color:red"><h2>JS Error</h2><pre>' +
          msg + '\n' + src + ':' + line + '\n' + (err && err.stack ? err.stack : '') +
          '</pre></div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:2rem;font-family:sans-serif;color:red"><h2>Unhandled Promise Rejection</h2><pre>' +
          (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) +
          '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
