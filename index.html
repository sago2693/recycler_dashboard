<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bogotá Dashboard</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f6fb;
        font-family: Arial, sans-serif;
      }

      .dashboard {
        width: min(960px, 92vw);
        background: #ffffff;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
      }

      h1 {
        margin: 0 0 16px;
        color: #093b67;
        font-size: clamp(1.2rem, 2.2vw, 1.8rem);
      }

      .nav-link {
        display: inline-block;
        margin: 0 0 14px;
        color: #0a5fa0;
        text-decoration: none;
        font-weight: 600;
      }

      .nav-link:hover {
        text-decoration: underline;
      }

      img {
        width: 100%;
        height: auto;
        border-radius: 10px;
        border: 1px solid #d8e2ef;
      }
    </style>
  </head>
  <body>
    <main class="dashboard">
      <h1>Map of Bogotá</h1>
      <a class="nav-link" href="./top10-recyclers.html">View Top 10 Recyclers →</a>
      <img src="./assets/bogota-real.png" alt="Aerial view of the city of Bogotá with the Andes mountains" />
    </main>
  </body>
</html>
